<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="app">
    <header class="header">
      <img class="header__img" src="./eisenhower-matrix.jpg" alt="the eisenhower matrix">
      <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main">
      <section>
        <div class="add-item">
            <h3 class="heading add-item__heading"><label class="add-item__title" for="new-task">Add Item</label></h3>
        </div>
        <div class="new-task">
          <input id="new-task" class="task__input new-task__input" type="text">
          <button class="button">Add</button>
        </div>
      </section>
      <section>
        <h3 class="heading">Todo</h3>
        <ul id="incomplete-tasks">
          <li class="task">
            <input type="checkbox" class="task__checkbox"><label class="task__name">Pay Bills</label>
            <input type="text" class="task__input text-input">
            <button class="button button_edit">Edit</button>
            <button class="button button_delete">
              <img class="button_delete-icon" src="./remove.svg" alt="delete">
            </button>
          </li>
          <li class="task edit-mode">
            <input type="checkbox" class="task__checkbox"><label class="task__name">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task__input text-input">
            <button class="button button_edit">Save</button>
            <button class="button button_delete">
              <img class="button_delete-icon" src="./remove.svg" alt="delete">
            </button>
          </li>
        </ul>
      </section>
      <section>
        <h3 class="heading">Completed</h3>
        <ul id="completed-tasks">
          <li class="task">
            <input type="checkbox" class="task__checkbox" checked><label class="task__name completed">See the Doctor</label>
            <input type="text" class="task__input text-input">
            <button class="button button_edit">Edit</button>
            <button class="button button_delete">
              <img class="button_delete-icon" src="./remove.svg" alt="delete">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
